<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prüfungssimulation</title>

<style>
:root{
  --bg:#262626; --text:#fff; --card:#333; --muted:#d9d9d9;
  --accent:#4c8bf5; --shadow:rgba(0,0,0,.55); --icon:#fff;
}
html.light{
  --bg:#e8edf1; --text:#1a1a1a; --card:#fff; --muted:#555;
  --accent:#2256c6; --shadow:rgba(0,0,0,.15); --icon:#000;
}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

/* HEADER */
header{
  position:sticky; top:0; z-index:20;
  padding:14px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,.35),transparent);
}
.bar{
  max-width:980px; margin:0 auto;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.menu-btn{
  position:absolute; left:0; top:50%; transform:translateY(-50%);
  background:none; border:none; padding:4px; color:var(--text); cursor:pointer;
}
.menu-btn svg{ width:34px; height:34px; stroke:currentColor; }
.logo{ font-size:22px; font-weight:700; }

.toggle{
  position:absolute; right:0; top:50%; transform:translateY(-50%);
  background:transparent; border:none; cursor:pointer;
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  padding:0;
}
.toggle svg{
  width:26px; height:26px; display:block;
}
.toggle span{
  display:flex; align-items:center; justify-content:center;
  width:100%; height:100%;
}

/* CONTENT */
.wrap{ max-width:980px; margin:auto; padding:24px; }
.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 24px var(--shadow);
  margin-bottom:20px;
}
.question-box{
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
  background:rgba(255,255,255,0.03);
}
.question-box h3{
  margin:0 0 12px;
  font-size:18px;
}
.frage{ margin-bottom:18px; text-align:left; }
.review-item{ border-radius:12px; padding:14px; margin:10px 0; }
.review-item.correct{ background:rgba(64,186,101,.14); border:1px solid rgba(64,186,101,.4); }
.review-item.wrong{ background:rgba(235,87,87,.12); border:1px solid rgba(235,87,87,.45); }
.review-item p{ margin:6px 0; }
.result-status.correct{ color:var(--good); font-weight:700; }
.result-status.wrong{ color:var(--bad); font-weight:700; }
.route-iframe{ width:100%; min-height:700px; border:1px solid rgba(255,255,255,.12); border-radius:16px; margin:16px 0; background:#000; }
label{ display:block; margin:6px 0; }

button{
  padding:12px 20px;
  border-radius:12px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* INPUT */
.fish-input{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:12px;
  border:2px solid var(--muted);
  background:var(--bg);
  color:var(--text);
  margin:14px 0 18px;
}
.fish-input:focus{ outline:none; border-color:var(--accent); }

/* MENU */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  opacity:0; pointer-events:none; transition:.25s; z-index:900;
}
.overlay.open{ opacity:1; pointer-events:auto; }

.side-menu{
  position:fixed; top:0; left:0;
  height:100vh; width:50vw; max-width:520px; min-width:280px;
  background:#333; color:#f1f1f1;
  border-right:1px solid #3f3f3f;
  transform:translateX(-100%);
  transition:.28s ease; z-index:1000;
}
.side-menu.open{ transform:translateX(0); }

.menu-header{
  padding:14px 16px; border-bottom:1px solid #444;
  display:flex; justify-content:space-between; align-items:center;
}
.menu-close{
  background:none; border:1px solid #555;
  color:#fff; border-radius:8px; padding:4px 8px; cursor:pointer;
}
.menu-list{ list-style:none; margin:0; padding:0; }
.menu-item, .menu-group{
  padding:12px 16px; border-bottom:1px solid #3f3f3f; cursor:pointer;
}
.menu-item:hover, .menu-group:hover{ background:#3a3a3a; }
.submenu{
  max-height:0; overflow:hidden; transition:.25s; background:#2c2c2c;
}
.submenu.open{ max-height:320px; }
.submenu-item{
  padding:12px 32px; border-bottom:1px solid #3a3a3a; cursor:pointer;
}
.submenu-item:hover{ background:#353535; }
</style>
</head>

<body>

<header>
  <div class="bar">
    <button class="menu-btn" id="menuButton">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="logo">Prüfungssimulation</div>

    <button class="toggle" id="themeBtn"><span id="themeIcon"></span></button>
  </div>
</header>

<main class="wrap" id="app"></main>

<div id="overlay" class="overlay"></div>

<nav id="sideMenu" class="side-menu">
  <div class="menu-header">
    <strong>Menü</strong>
    <button class="menu-close" id="menuClose">✕</button>
  </div>
  <ul class="menu-list">
    <li class="menu-item" onclick="go('index.html')">🏠 Start</li>
    <li class="menu-group" id="lernenToggle">
      <span>📘 Lernen</span><span class="caret">▶</span>
    </li>
    <div class="submenu" id="lernenMenu">
      <div class="submenu-item">Fischkunde</div>
      <div class="submenu-item">Prüfungsfragen</div>
      <div class="submenu-item">Rutenbau</div>
    </div>
  </ul>
</nav>

<script>
function go(u){ location.href=u }

menuButton.onclick=()=>{sideMenu.classList.add("open");overlay.classList.add("open")}
menuClose.onclick=overlay.onclick=()=>{sideMenu.classList.remove("open");overlay.classList.remove("open")}
lernenToggle.onclick=()=>{
  lernenMenu.classList.toggle("open")
  lernenToggle.querySelector(".caret").style.transform =
    lernenMenu.classList.contains("open")?"rotate(90deg)":"rotate(0deg)"
}

/* THEME */
;(function(){
  const themeBtn=document.getElementById("themeBtn")
  const themeIcon=document.getElementById("themeIcon")
  const saved=localStorage.getItem("theme")||"dark"
  document.documentElement.classList.add(saved); setIcon(saved)
  themeBtn.onclick=()=>{
    const n=document.documentElement.classList.contains("dark")?"light":"dark"
    document.documentElement.classList.remove("dark","light")
    document.documentElement.classList.add(n)
    localStorage.setItem("theme",n); setIcon(n)
  }
  function setIcon(m){
    themeIcon.innerHTML=
      m==="dark"
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="var(--icon)"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`
  }
})()

      { name: "Aal", bild: "img/Fische/Aal.png" },
      { name: "Barsch", bild: "img/Fische/Barsch.png" },
      { name: "Zander", bild: "img/Fische/Zander.png" },
      { name: "Europäischer Wels", bild: "img/Fische/Europäischer-Wels.png" },
      { name: "Hecht", bild: "img/Fische/Hecht.png" },
      { name: "Kaulbarsch", bild: "img/Fische/Kaulbarsch.png" },
      { name: "Äsche", bild: "img/Fische/Äsche.png" },
      { name: "Bachforelle", bild: "img/Fische/Bachforelle.png" },
      { name: "Regenbogenforelle", bild: "img/Fische/Regenbogenforelle.png" },
      { name: "Atlantischer Lachs", bild: "img/Fische/Atlantischer-Lachs.png" },
      { name: "Renke", bild: "img/Fische/Renke.png" },
      { name: "Bachsaibling", bild: "img/Fische/Bachsaibling.png" },
      { name: "Dorsch / Kabeljau", bild: "img/Fische/Dorsch-Kabeljau.png" },
      { name: "Atlantischer Hering", bild: "img/Fische/Atlantischer-Hering.png" },
      { name: "Scholle", bild: "img/Fische/Scholle.png" },
      { name: "Maifisch", bild: "img/Fische/Maifisch.png" },
      { name: "Finte", bild: "img/Fische/Finte.png" },
      { name: "Flunder", bild: "img/Fische/Flunder.png" },
      { name: "Makrele", bild: "img/Fische/Makrele.png" },
      { name: "Nordseeschnäpel", bild: "img/Fische/Nordseeschnäpel.png" },
      { name: "Meerforelle", bild: "img/Fische/Meerforelle.png" },
      { name: "Amerikanischer Flusskrebs", bild: "img/Fische/Amerikanischer-Flusskrebs.png" },
      { name: "Europäischer Flusskrebs", bild: "img/Fische/Europäischer-Flusskrebs.png" },
      { name: "Stör", bild: "img/Fische/Stör.png" },
      { name: "Flussneunauge", bild: "img/Fische/Flussneunauge.png" },
      { name: "Quappe", bild: "img/Fische/Quappe.png" },
      { name: "Dreistachliger Stichling", bild: "img/Fische/Dreistachliger-Stichling.png" },
      { name: "Koppe / Groppe", bild: "img/Fische/Koppe-Groppe.png" },
      { name: "Zwergstichling", bild: "img/Fische/Zwergstichling.png" }
    ];

const state={ kat:0, fragen:{}, answers:[], fAntwort:[], fPool:[] }
const shuffle=a=>[...a].sort(()=>Math.random()-.5)
const app=document.getElementById("app")

kategorien.forEach(k=>{
  state.fragen[k]=shuffle(fragen.filter(f=>f.kategorie===k)).slice(0,10)
})

function renderFragen(){
  const k=kategorien[state.kat]
  let h=`<div class="card"><h2>${k}</h2><form id="f">`
  state.fragen[k].forEach((q,i)=>{
    h+=`<div class="question-box"><h3>Frage ${i+1}</h3><p>${q.frage}</p>`
    q.antworten.forEach((a,j)=>{
      h+=`<label><input type="radio" name="q${i}" value="${j}"> ${a}</label>`
    })
    h+=`</div>`
  })
  h+=`<button>Weiter</button></form></div>`
  app.innerHTML=h
  document.getElementById("f").onsubmit=e=>{
    e.preventDefault()
    const form=document.getElementById("f")
    state.fragen[k].forEach((q,i)=>{
      const sel=form.querySelector(`input[name="q${i}"]:checked`)
      state.answers.push({
        frage:q.frage,
        antworten:q.antworten,
        ausgewählt: sel? Number(sel.value) : null,
        korrekt:q.korrekt
      })
    })
    state.kat++
    state.kat<kategorien.length?renderFragen():renderOverview()
  }
}

function renderOverview(){
  const score=state.answers.filter(a=>a.ausgewählt===a.korrekt).length
  let h=`<div class="card"><h2>Prüfübersicht</h2><p>Richtige Antworten: ${score}/${state.answers.length}</p>`
  state.answers.forEach((item,i)=>{
    const selected = item.ausgewählt !== null ? item.antworten[item.ausgewählt] : "Keine Auswahl"
    const correct = item.antworten[item.korrekt]
    const isCorrect = item.ausgewählt === item.korrekt
    const statusText = isCorrect ? "Richtig" : "Falsch"
    const statusClass = isCorrect ? "correct" : "wrong"
    h += `
      <div class="frage review-item ${statusClass}">
        <p><strong>Frage ${i+1}:</strong> ${item.frage}</p>
        <p>Status: <strong>${statusText}</strong></p>
        <p>Deine Antwort: ${selected}</p>
        <p>Richtige Antwort: ${correct}</p>
      </div>`
  })
  h+=`<button onclick="startFische()">Weiter zu den Fischen</button></div>`
  app.innerHTML=h
}

function startFische(){
  state.fPool=shuffle(fische).slice(0,6)
  state.fIdx=0
  renderFisch()
}

function renderFisch(){
  const f=state.fPool[state.fIdx]
  app.innerHTML=`
  <div class="card">
    <h2>Fischerkennung (${state.fIdx+1}/${state.fPool.length})</h2>
    <img src="${f.bild}" style="max-width:100%;display:block;margin:0 auto 16px;" alt="${f.name}">
    <input id="fi" class="fish-input" placeholder="Name eingeben">
    <button onclick="nextFish()">Weiter</button>
  </div>`
  document.getElementById("fi").focus()
}

function nextFish(){
  const v=document.getElementById("fi").value.trim()
  if(!v) return alert("Bitte Namen eingeben")
  state.fAntwort.push(v.toLowerCase())
  state.fIdx++
  state.fIdx<state.fPool.length?renderFisch():ergebnis()
}

function ergebnis(){
  const richtig=state.fAntwort.filter((a,i)=>a===state.fPool[i].name.toLowerCase()).length
  const ruteIndex=Math.floor(Math.random()*10)+1
  const ruteFile=`rute${ruteIndex}.html`
  let h=`
  <div class="card">
    <h2>Ergebnis</h2>
    <p>Fischerkennung: ${richtig}/${state.fPool.length}</p>
  </div>`
  state.fPool.forEach((f,i)=>{
    const userAnswer=state.fAntwort[i] || "Keine Eingabe"
    const isCorrect=userAnswer.toLowerCase()===f.name.toLowerCase()
    const statusClass=isCorrect?"correct":"wrong"
    const statusText=isCorrect?"Richtig":"Falsch"
    h+=`
      <div class="frage review-item ${statusClass}">
        <h3>Fisch ${i+1}</h3>
        <img src="${f.bild}" style="max-width:100%;display:block;margin:0 auto 16px;" alt="${f.name}">
        <p>Status: <strong>${statusText}</strong></p>
        <p>Deine Antwort: ${userAnswer}</p>
        <p>Richtige Antwort: ${f.name}</p>
      </div>`
  })
  h+=`
  <div class="card">
    <h2>Zufällige Rute</h2>
    <button onclick="go('${ruteFile}')">Zufällige Rute ansehen</button>
    <button onclick="go('index.html')">Zurück</button>
  </div>`
  app.innerHTML=h
}

renderFragen()
</script>
