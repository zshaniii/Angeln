<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mein Profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#262626;color:#fff;font-family:system-ui}
.wrap{max-width:700px;margin:40px auto;padding:20px}
.card{background:#333;padding:24px;border-radius:16px}
label{display:block;margin-top:14px}
input,textarea{width:100%;padding:10px;border-radius:10px;border:none}
textarea{min-height:90px}
button{margin-top:18px;width:100%;padding:12px;border:none;border-radius:12px;background:#4c8bf5;color:#fff}
.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto;display:block}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h2>Mein Profil</h2>

    <img id="avatarPreview" class="avatar">
    <input type="file" id="avatarInput">

    <label>Name</label>
    <input id="fullName">

    <label>E‑Mail</label>
    <input id="email">

    <label>Ort</label>
    <input id="location">

    <label>Über mich</label>
    <textarea id="bio"></textarea>

    <button id="saveBtn">Profil speichern</button>
    <button onclick="logout()">Abmelden</button>
  </div>
</div>

<script src="auth.js"></script>
<script>
if (!isLoggedIn()) location.href = "login.html";

let avatarData = "";

async function init() {
  const p = await loadProfile();
  if (!p) return;
  fullName.value = p.fullName || "";
  email.value = p.email || "";
  location.value = p.location || "";
  bio.value = p.bio || "";
  avatarPreview.src = p.avatar || "";
  avatarData = p.avatar || "";
}

avatarInput.onchange = () => {
  const f = avatarInput.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    avatarPreview.src = r.result;
    avatarData = r.result;
  };
  r.readAsDataURL(f);
};

saveBtn.onclick = async () => {
  await saveProfile({
    fullName: fullName.value,
    email: email.value,
    location: location.value,
    bio: bio.value,
    avatar: avatarData
  });
  alert("Profil gespeichert ✅");
};

init();
</script>
</body>
</html>
