<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden | Angler App</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #262626;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    .card {
      background: #333;
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #4c8bf5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .msg {
      margin-top: 14px;
      text-align: center;
    }

    .link {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
    }

    .link a {
      color: #4c8bf5;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Anmelden</h1>

    <label>Benutzername</label>
    <input id="username">

    <label>Passwort</label>
    <input id="password" type="password">

    <button id="loginBtn">Einloggen</button>

    <div class="msg" id="msg"></div>

    <div class="link">
      Noch kein Konto?
      <a href="register.html">Registrieren</a>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    if (isLoggedIn()) {
      location.href = "account.html";
    }

    loginBtn.onclick = async () => {
      msg.textContent = "Anmelden …";

      const ok = await loginUser(
        username.value.trim(),
        password.value
      );

      if (ok) {
        location.href = "account.html";
      } else {
        msg.textContent = "Login fehlgeschlagen";
      }
    };
  </script>

</body>
</html>
