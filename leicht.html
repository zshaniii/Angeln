<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leichtes Quiz</title>

  <style>
    :root{
      --bg:#262626; --text:#fff; --card:#333;
      --shadow:rgba(0,0,0,.55); --icon:#fff;
    }
    html.light{
      --bg:#e8edf1; --text:#1a1a1a; --card:#fff;
      --icon:#000; --shadow:rgba(0,0,0,.15);
    }

    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      transition:background .25s,color .25s;
    }

    /* ===== HEADER ===== */
    header{
      position:sticky; top:0; z-index:50;
      padding:14px 16px;
      background:linear-gradient(180deg,rgba(0,0,0,.35),transparent);
    }
    .bar{
      max-width:980px; margin:0 auto;
      display:flex; align-items:center; justify-content:center;
      position:relative;
    }
    .menu-btn{
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      background:transparent; border:none; cursor:pointer; color:var(--text); padding:4px;
    }
    .menu-btn svg{ width:34px; height:34px; stroke:currentColor; }
    .logo{ font-size:22px; font-weight:700; }
    .toggle{
      position:absolute; right:0; top:50%; transform:translateY(-50%);
      background:transparent; border:none; cursor:pointer;
      width:40px; height:40px; display:flex; align-items:center; justify-content:center;
      color:var(--icon);
    }
    .toggle svg{ width:26px; height:26px; }

    /* ===== QUIZ ===== */
    #quiz{ max-width:600px; margin:30px auto; text-align:center; }
    #fischBild{ max-width:100%; border-radius:12px; border:1px solid #444; }

    /* Antwort-Buttons – kürzer und zentriert */
    #choices{ margin-top:16px; display:grid; gap:10px; }
    #choices .choice{
      max-width:280px;   /* nie breiter als 280px */
      width:80%;         /* sonst 80% der verfügbaren Breite */
      margin:0 auto;     /* zentrieren */
      background:#4c8bf5; color:#fff; border:none;
      border-radius:12px; padding:12px 16px; cursor:pointer; font-size:17px;
      transition:.15s;
    }
    #choices .choice:hover{ background:#6ea3ff; transform:translateY(-2px); }
    #choices .choice.selected{ outline:3px solid #ffd166; }
    #choices .choice.correct{ background:#22c55e !important; }
    #choices .choice.wrong{ background:#c62828 !important; }

    #btnPruefen,#btnWeiter{
      background:#333; color:#fff; border:1px solid #555;
      padding:10px 16px; border-radius:10px; cursor:pointer; margin:6px;
    }
    #btnPruefen:hover,#btnWeiter:hover{ background:#3a3a3a; }

    /* ===== OVERLAY + SIDEMENU ===== */
    .overlay{
      position:fixed; inset:0; opacity:0; pointer-events:none;
      background:rgba(0,0,0,.6); transition:.25s ease; z-index:900;
    }
    .overlay.open{ opacity:1; pointer-events:auto; }

    .side-menu{
      position:fixed; top:0; left:0; height:100vh;
      width:50vw; max-width:520px; min-width:280px;
      background:#333; color:#fff; border-right:1px solid #444;
      transform:translateX(-100%); transition:.28s ease; z-index:1000;
      display:flex; flex-direction:column;
    }
    .side-menu.open{ transform:translateX(0); }

    .menu-header{
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 16px; border-bottom:1px solid #444;
    }
    .menu-close{
      background:transparent; border:1px solid #555; padding:6px 10px;
      border-radius:8px; cursor:pointer; color:#fff;
    }
    .menu-list{ list-style:none; margin:0; padding:0; }
    .menu-item{
      padding:14px 16px; border-bottom:1px solid #444; cursor:pointer;
    }
    .menu-item:hover{ background:#3a3a3a; }

    /* ===== Dropdown-Gruppe „Lernen“ ===== */
    .menu-group{
      padding:14px 16px; border-bottom:1px solid #444; cursor:pointer;
      display:flex; justify-content:space-between; align-items:center; user-select:none;
    }
    .menu-group:hover{ background:#3a3a3a; }
    .caret{ transition:.25s; }

    .submenu{
      max-height:0; overflow:hidden; background:#2c2c2c;
      transition:max-height .28s ease;
    }
    .submenu.open{ max-height:300px; }
    .submenu-item{
      padding:12px 32px; border-bottom:1px solid #3a3a3a; cursor:pointer;
    }
    .submenu-item:hover{ background:#353535; }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="bar">
      <!-- Menü -->
      <button class="menu-btn" id="menuButton" aria-label="Menü öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6"  x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <!-- Titel -->
      <div class="logo">Leicht – Quiz</div>

      <!-- Theme -->
      <button class="toggle" id="themeBtn" aria-label="Theme umschalten">
        <span id="themeIcon"></span>
      </button>
    </div>
  </header>

  <!-- ===== QUIZ ===== -->
  <div id="quiz">
    <img id="fischBild" src="" alt="Fisch">

    <div id="choices">
      <button class="choice"></button>
      <button class="choice"></button>
      <button class="choice"></button>
    </div>

    <div style="margin-top:16px;">
      <button id="btnPruefen">Prüfen</button>
      <button id="btnWeiter" disabled>Weiter</button>
    </div>

    <p id="result" style="min-height:28px; font-size:18px;"></p>
  </div>

  <!-- ===== OVERLAY + SIDE MENU ===== -->
  <div id="overlay" class="overlay"></div>

  <nav id="sideMenu" class="side-menu" aria-label="Hauptmenü">
    <div class="menu-header">
      <strong>Menü</strong>
      <button id="menuClose" class="menu-close" aria-label="Menü schließen">✕</button>
    </div>

    <ul class="menu-list">
      <li class="menu-item" onclick="go('index.html')">🏠 Startseite</li>

      <!-- Aufklappbarer Ordner: Lernen -->
      <li class="menu-group" id="lernenToggle">
        <span>📘 Lernen</span>
        <span class="caret">▶</span>
      </li>
      <div class="submenu" id="lernenMenu">
        <div class="submenu-item" onclick="go('fischkunde.html')">Fischkunde</div>
        <div class="submenu-item" onclick="go('pruefungsfragen.html')">Prüfungsfragen</div>
        <div class="submenu-item" onclick="go('rutenbau.html')">Rutenbau</div>
      </div>

      <li class="menu-item" onclick="go('schonzeiten.html')">🗓️ Schonzeiten &amp; Mindestmaß</li>
      <li class="menu-item" onclick="go('account.html')">👤 Mein Konto</li>
    </ul>
  </nav>
  <script>
    function go(u){ window.location.href = u }

    /* Slide-In Menü */
    const menuBtn   = document.getElementById("menuButton");
    const sideMenu  = document.getElementById("sideMenu");
    const overlay   = document.getElementById("overlay");
    const menuClose = document.getElementById("menuClose");

    menuBtn.onclick   = () => { sideMenu.classList.add("open"); overlay.classList.add("open"); };
    menuClose.onclick = () => { sideMenu.classList.remove("open"); overlay.classList.remove("open"); };
    overlay.onclick   = () => { sideMenu.classList.remove("open"); overlay.classList.remove("open"); };

    /* Dropdown „Lernen“ */
    const lernenToggle = document.getElementById("lernenToggle");
    const lernenMenu   = document.getElementById("lernenMenu");
    const caret        = lernenToggle.querySelector(".caret");

    lernenToggle.onclick = () => {
      lernenMenu.classList.toggle("open");
      caret.style.transform = lernenMenu.classList.contains("open") ? "rotate(90deg)" : "rotate(0deg)";
    };

    /* Theme Switch */
    (function(){
      const saved = localStorage.getItem("theme") || "dark";
      document.documentElement.classList.add(saved);
      setIcon(saved);

      document.getElementById("themeBtn").onclick = () => {
        const now = document.documentElement.classList.contains("dark") ? "light" : "dark";
        document.documentElement.classList.remove("dark","light");
        document.documentElement.classList.add(now);
        localStorage.setItem("theme", now);
        setIcon(now);
      };

      function setIcon(mode){
        document.getElementById("themeIcon").innerHTML =
          mode === "dark"
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="var(--icon)"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
      }
    })();
  </script>

  <script>
    /* ====== QUIZ-LOGIK ====== */
    const fische = [
      { name: "Karpfen", bild: "img/Fische/Karpfen.png" },
      { name: "Schleie", bild: "img/Fische/Schleie.png" },
      { name: "Brachsen oder Blei", bild: "img/Fische/BrachsenOderBlei.png" },
      { name: "Rotfeder", bild: "img/Fische/Rotfeder.png" },
      { name: "Rotauge / Plätze", bild: "img/Fische/Rotauge-Plaetze.png" },
      { name: "Barbe", bild: "img/Fische/Barbe.png" },
      { name: "Döbel", bild: "img/Fische/Döbel.png" },
      { name: "Güster", bild: "img/Fische/Güster.png" },
      { name: "Karausche", bild: "img/Fische/Karausche.png" },
      { name: "Giebel", bild: "img/Fische/Giebel.png" },
      { name: "Zope", bild: "img/Fische/Zope.png" },
      { name: "Hasel", bild: "img/Fische/Hasel.png" },
      { name: "Aland", bild: "img/Fische/Aland.png" },
      { name: "Nase", bild: "img/Fische/Nase.png" },
      { name: "Ukelei", bild: "img/Fische/Ukelei.png" },
      { name: "Elritze", bild: "img/Fische/Elritze.png" },
      { name: "Moderlieschen", bild: "img/Fische/Moderlieschen.png" },
      { name: "Gründling", bild: "img/Fische/Gründling.png" },
      { name: "Bachschmerle", bild: "img/Fische/Bachschmerle.png" },
      { name: "Steinbeißer", bild: "img/Fische/Steinbeißer.png" },
      { name: "Wildkarpfen", bild: "img/Fische/Wildkarpfen.png" },
      { name: "Bitterling", bild: "img/Fische/Bitterling.png" },
      { name: "Schneider", bild: "img/Fische/Schneider.png" },
      { name: "Zährte", bild: "img/Fische/Zährte.png" },
      { name: "Rapfen", bild: "img/Fische/Rapfen.png" },
      { name: "Europäischer Schlammpeitzer", bild: "img/Fische/Europäischer-Schlammpeitzer.png" },
      { name: "Aal", bild: "img/Fische/Aal.png" },
      { name: "Barsch", bild: "img/Fische/Barsch.png" },
      { name: "Zander", bild: "img/Fische/Zander.png" },
      { name: "Europäischer Wels", bild: "img/Fische/Europäischer-Wels.png" },
      { name: "Hecht", bild: "img/Fische/Hecht.png" },
      { name: "Kaulbarsch", bild: "img/Fische/Kaulbarsch.png" },
      { name: "Äsche", bild: "img/Fische/Äsche.png" },
      { name: "Bachforelle", bild: "img/Fische/Bachforelle.png" },
      { name: "Regenbogenforelle", bild: "img/Fische/Regenbogenforelle.png" },
      { name: "Atlantischer Lachs", bild: "img/Fische/Atlantischer-Lachs.png" },
      { name: "Renke", bild: "img/Fische/Renke.png" },
      { name: "Bachsaibling", bild: "img/Fische/Bachsaibling.png" },
      { name: "Dorsch / Kabeljau", bild: "img/Fische/Dorsch-Kabeljau.png" },
      { name: "Atlantischer Hering", bild: "img/Fische/Atlantischer-Hering.png" },
      { name: "Scholle", bild: "img/Fische/Scholle.png" },
      { name: "Maifisch", bild: "img/Fische/Maifisch.png" },
      { name: "Finte", bild: "img/Fische/Finte.png" },
      { name: "Flunder", bild: "img/Fische/Flunder.png" },
      { name: "Makrele", bild: "img/Fische/Makrele.png" },
      { name: "Nordseeschnäpel", bild: "img/Fische/Nordseeschnäpel.png" },
      { name: "Meerforelle", bild: "img/Fische/Meerforelle.png" },
      { name: "Amerikanischer Flusskrebs", bild: "img/Fische/Amerikanischer-Flusskrebs.png" },
      { name: "Europäischer Flusskrebs", bild: "img/Fische/Europäischer-Flusskrebs.png" },
      { name: "Stör", bild: "img/Fische/Stör.png" },
      { name: "Flussneunauge", bild: "img/Fische/Flussneunauge.png" },
      { name: "Quappe", bild: "img/Fische/Quappe.png" },
      { name: "Dreistachliger Stichling", bild: "img/Fische/Dreistachliger-Stichling.png" },
      { name: "Koppe / Groppe", bild: "img/Fische/Koppe-Groppe.png" },
      { name: "Zwergstichling", bild: "img/Fische/Zwergstichling.png" }
    ];

    function shuffle(arr){ return [...arr].sort(() => Math.random() - 0.5); }
    function sampleWithoutIndex(arr, n, excludeIndex){
      const pool = arr.filter((_, i) => i !== excludeIndex);
      if (pool.length < n) throw new Error("Zu wenige Fische für Distraktoren.");
      return shuffle(pool).slice(0, n);
    }

    // --- State ---
    let deck = [];
    let aktuelleRunde = null;
    let gewaehlt = null;

    function neuesDeck(){ deck = shuffle([...Array(fische.length).keys()]); }

    function neueRunde(){
      if (deck.length === 0) neuesDeck();
      const idx = deck.pop();
      const korrekt = fische[idx];

      const distractorFische = sampleWithoutIndex(fische, 2, idx);
      const optionen = shuffle([korrekt.name, ...distractorFische.map(f => f.name)]);
      aktuelleRunde = { korrekt, korrektName: korrekt.name, optionen };
      gewaehlt = null;
      renderRunde();
    }

    function renderRunde(){
      const img = document.getElementById("fischBild");
      img.src = aktuelleRunde.korrekt.bild;
      img.alt = "Welcher Fisch ist das?";

      const buttons = [...document.querySelectorAll("#choices .choice")];
      buttons.forEach((btn, i) => {
        btn.textContent = aktuelleRunde.optionen[i];
        btn.classList.remove("selected","correct","wrong");
        btn.disabled = false;
        btn.onclick = () => {
          buttons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          gewaehlt = btn.textContent;
        };
      });

      document.getElementById("result").textContent = "";
      document.getElementById("btnPruefen").disabled = false;
      document.getElementById("btnWeiter").disabled = true;
    }

    function pruefen(){
      if (!gewaehlt){
        document.getElementById("result").textContent = "Bitte erst eine Antwort auswählen.";
        return;
      }

      const buttons = [...document.querySelectorAll("#choices .choice")];
      buttons.forEach(b => b.disabled = true);

      buttons.forEach(b => {
        if (b.textContent === aktuelleRunde.korrektName) b.classList.add("correct");
      });
      const gewBtn = buttons.find(b => b.textContent === gewaehlt);
      if (gewaehlt !== aktuelleRunde.korrektName){
        gewBtn?.classList.add("wrong");
        document.getElementById("result").textContent = "Falsch! Richtige Antwort: " + aktuelleRunde.korrektName;
        document.getElementById("result").style.color = "salmon";
      } else {
        document.getElementById("result").textContent = "Richtig!";
        document.getElementById("result").style.color = "lightgreen";
      }

      document.getElementById("btnPruefen").disabled = true;
      document.getElementById("btnWeiter").disabled = false;
    }

    function weiter(){ neueRunde(); }

    // Init
    window.addEventListener("DOMContentLoaded", () => {
      neuesDeck();
      neueRunde();
      document.getElementById("btnPruefen").addEventListener("click", pruefen);
      document.getElementById("btnWeiter").addEventListener("click", weiter);
    });
  </script>

</body>
</html>
