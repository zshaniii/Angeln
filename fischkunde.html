<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Fischkunde</title>

  <style>
    :root{
      --bg:#262626; --text:#fff; --card:#333; --muted:#d9d9d9;
      --accent:#4c8bf5; --shadow:rgba(0,0,0,.55); --icon:#fff;

      /* Farben für Badges/Ring */
      --green:#22c55e;   /* Leicht */
      --orange:#f59e0b;  /* Mittel */
      --red:#ef4444;     /* Schwer */
    }
    html.light{
      --bg:#e8edf1; --text:#1a1a1a; --card:#fff; --muted:#555;
      --accent:#2256c6; --shadow:rgba(0,0,0,.15); --icon:#000;
    }

    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      transition:background .25s,color .25s;
    }

    /* ===== HEADER ===== */
    header{
      position:sticky; top:0; z-index:20;
      padding:14px 16px;
      background:linear-gradient(180deg,rgba(0,0,0,.35),transparent);
    }
    .bar{
      max-width:980px; margin:0 auto;
      display:flex; align-items:center; justify-content:center;
      position:relative;
    }

    /* Menü-Button links (SVG, öffnet Slide-In-Menü) */
    .menu-btn{
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      background:transparent; border:none; cursor:pointer; padding:4px;
      color:var(--text);
    }
    .menu-btn svg{ width:34px; height:34px; stroke:currentColor; }

    /* Titel/Logo Mitte */
    .logo{
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:22px;
    }

    /* Theme rechts */
    .toggle{
      position:absolute; right:0; top:50%; transform:translateY(-50%);
      background:transparent; border:none; cursor:pointer;
      width:40px; height:40px; display:flex; align-items:center; justify-content:center;
      padding:0; color:var(--icon);
    }
    .toggle svg{ width:26px; height:26px; display:block; }

    /* ===== LAYOUT ===== */
    .wrap{ max-width:980px; margin:0 auto; padding:24px; text-align:center; }

    /* Buttons – gleicher Kartenstil wie index.html */
    .stack{ display:flex; flex-direction:column; gap:20px; align-items:center; margin-top:40px; }

    .btn-card{
      width:80%; max-width:420px;
      background:var(--card); color:var(--text);
      padding:18px 20px; border-radius:16px;
      display:flex; align-items:center; justify-content:center; gap:12px;
      cursor:pointer; border:2px solid transparent;
      transition:transform .18s,border-color .18s, box-shadow .18s;
      box-shadow:0 8px 24px var(--shadow);
      position:relative;
    }
    .btn-card:hover{ transform:translateY(-3px); border-color:#ffffff33; }
    .btn-card.disabled{ opacity:.55; pointer-events:none; }

    /* Farbringe */
    .btn-card::before{
      content:""; position:absolute; inset:-4px;
      border-radius:20px; border:2px solid transparent; pointer-events:none;
      transition:border-color .25s ease;
    }
    .btn-card.leicht::before { border-color:var(--green); }
    .btn-card.mittel::before { border-color:var(--orange); }
    .btn-card.schwer::before { border-color:var(--red); }

    /* Badges */
    .badge{
      font-size:12px; font-weight:800; letter-spacing:.2px;
      padding:4px 8px; border-radius:8px; color:#0b0b0b;
      background:#e5e7eb;
      display:flex; align-items:center; gap:8px;
    }
    .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
    .badge.leicht{ color:#0a0; background:rgba(34,197,94,.15); }
    .badge.mittel{ color:#a65b00; background:rgba(245,158,11,.15); }
    .badge.schwer{ color:#900; background:rgba(239,68,68,.15); }

    .btn-title{ font-size:20px; font-weight:700; }

    /* DARKMODE Feinheiten */
    html.dark .btn-card{ background:#2f2f2f; }

    /* ===== Overlay + Slide-In-Menü ===== */
    .overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      opacity:0; pointer-events:none; transition:.25s; z-index:900;
    }
    .overlay.open{ opacity:1; pointer-events:auto; }

    .side-menu{
      position:fixed; top:0; left:0; height:100vh; width:50vw;
      max-width:520px; min-width:280px; background:#333; color:#f1f1f1;
      border-right:1px solid #3f3f3f;
      transform:translateX(-100%); transition:transform .28s ease; z-index:1000;
      display:flex; flex-direction:column;
    }
    .side-menu.open{ transform:translateX(0); }
    .menu-header{
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 16px; border-bottom:1px solid #444;
    }
    .menu-close{
      background:transparent; border:1px solid #555; color:#f1f1f1;
      border-radius:10px; padding:6px 10px; cursor:pointer;
    }
    .menu-close:hover{ background:#3a3a3a; }
    .menu-list{ list-style:none; padding:0; margin:0; }
    .menu-item{ padding:12px 16px; border-bottom:1px solid #3f3f3f; cursor:pointer; }
    .menu-item:hover{ background:#3a3a3a; }

    /* ===== Dropdown „Lernen“ (NEU) ===== */
    .menu-group{
      padding:14px 16px; border-bottom:1px solid #444; cursor:pointer;
      display:flex; justify-content:space-between; align-items:center; user-select:none;
    }
    .menu-group:hover{ background:#3a3a3a; }
    .caret{ transition:.25s; }

    .submenu{
      max-height:0; overflow:hidden; background:#2c2c2c;
      transition:max-height .28s ease;
    }
    .submenu.open{ max-height:300px; }
    .submenu-item{
      padding:12px 32px; border-bottom:1px solid #3a3a3a; cursor:pointer;
    }
    .submenu-item:hover{ background:#353535; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="bar">
      <!-- Menü-Button (öffnet Slide-In) -->
      <button class="menu-btn" id="menuButton" aria-label="Menü öffnen">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <!-- Titel -->
      <div class="logo">Fischkunde</div>

      <!-- Theme Toggle -->
      <button class="toggle" id="themeBtn" aria-label="Theme umschalten">
        <span id="themeIcon"></span>
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="wrap">
    <div class="stack">
      <div id="fischkundeInfo" style="font-size:14px; color:var(--muted); text-align:left; width:80%; max-width:420px; margin:0 auto 8px;"></div>
      <!-- LEICHT -->
      <div id="btnLeicht" class="btn-card leicht" onclick="openFischLevel('leicht.html','leicht')" role="link" tabindex="0" aria-label="Leicht öffnen">
        <span class="badge leicht"><span class="dot" style="background:var(--green)"></span>Leicht</span>
        <div class="btn-title"></div>
      </div>
      <!-- MITTEL -->
      <div id="btnMittel" class="btn-card mittel" onclick="openFischLevel('mittel.html','mittel')" role="link" tabindex="0" aria-label="Mittel öffnen">
        <span class="badge mittel"><span class="dot" style="background:var(--orange)"></span>Mittel</span>
        <div class="btn-title"></div>
      </div>
      <!-- SCHWER -->
      <div id="btnSchwer" class="btn-card schwer" onclick="openFischLevel('schwer.html','schwer')" role="link" tabindex="0" aria-label="Schwer öffnen">
        <span class="badge schwer"><span class="dot" style="background:var(--red)"></span>Schwer</span>
        <div class="btn-title"></div>
      </div>
    </div>
  </main>

  <!-- OVERLAY + SLIDE-IN-MENÜ -->
  <div id="overlay" class="overlay"></div>

  <nav id="sideMenu" class="side-menu" aria-label="Hauptmenü">
    <div class="menu-header">
      <strong>Menü</strong>
      <button id="menuClose" class="menu-close" aria-label="Menü schließen">✕</button>
    </div>

    <ul class="menu-list">
      <li class="menu-item" onclick="go('index.html')">🏠 Start</li>

      <!-- 📘 Lernen – aufklappbar (NEU) -->
      <li class="menu-group" id="lernenToggle">
        <span>📘 Lernen</span>
        <span class="caret">▶</span>
      </li>
      <div class="submenu" id="lernenMenu">
        <div class="submenu-item" onclick="go('fischkunde.html')">Fischkunde</div>
        <div class="submenu-item" onclick="go('pruefungsfragen.html')">Prüfungsfragen</div>
        <div class="submenu-item" onclick="go('rutenbau.html')">Rutenbau</div>
      </div>

      <li class="menu-item" onclick="go('schonzeiten.html')">🗓️ Schonzeiten</li>
      <li class="menu-item" onclick="go('account.html')">👤 Mein Konto</li>
    </ul>
  </nav>
<script src="auth.js"></script>
  <script>
    /* Navigation */
    function go(u){ window.location.href = u }

    /* Slide-In-Menü */
    const menuBtn = document.getElementById('menuButton');
    const sideMenu = document.getElementById('sideMenu');
    const overlay  = document.getElementById('overlay');
    const menuClose= document.getElementById('menuClose');

    function openMenu(){ sideMenu.classList.add('open'); overlay.classList.add('open'); }
    function closeMenu(){ sideMenu.classList.remove('open'); overlay.classList.remove('open'); }

    menuBtn.addEventListener('click', openMenu);
    menuClose.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

    function openFischLevel(page, level){
      if(!canAccessFischkundeLevel(level)){
        alert('Mittel und Schwer sind nur für angemeldete Nutzer verfügbar. Bitte melde dich an.');
        return;
      }
      go(page);
    }

    function updateFischkundeAccess(){
      const info = document.getElementById('fischkundeInfo');
      const mittel = document.getElementById('btnMittel');
      const schwer = document.getElementById('btnSchwer');

      if(canAccessFischkundeLevel('mittel')){
        info.textContent = 'Alle Schwierigkeitsgrade sind freigeschaltet.';
        mittel.classList.remove('disabled');
        schwer.classList.remove('disabled');
      } else {
        info.textContent = 'Anmeldung erforderlich für Mittel und Schwer.';
        mittel.classList.add('disabled');
        schwer.classList.add('disabled');
      }
    }

    /* Dropdown „Lernen“ (NEU) */
    const lernenToggle = document.getElementById('lernenToggle');
    const lernenMenu   = document.getElementById('lernenMenu');
    const caret        = lernenToggle.querySelector('.caret');

    lernenToggle.onclick = () => {
      lernenMenu.classList.toggle('open');
      caret.style.transform = lernenMenu.classList.contains('open') ? 'rotate(90deg)' : 'rotate(0deg)';
    };

    updateFischkundeAccess();

    /* Theme Switch – identisch zu index.html */
    (function(){
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.classList.add(saved);
      setIcon(saved);

      document.getElementById('themeBtn').onclick = () =>{
        const now = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
        document.documentElement.classList.remove('dark','light');
        document.documentElement.classList.add(now);
        localStorage.setItem('theme', now);
        setIcon(now);
      };

      function setIcon(mode){
        document.getElementById('themeIcon').innerHTML =
          mode === 'dark'
            /* Sonne (weiß) */
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>'
            /* Mond (schwarz im Light-Mode) */
            : '<svg viewBox="0 0 24 24" fill="var(--icon)"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
      }
    })();
  </script>

</body>
</html>
