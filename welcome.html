<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Willkommen | Angler Welt</title>
<style>
:root{--bg:#262626;--text:#fff;--card:#333;--accent:#4c8bf5;--shadow:rgba(0,0,0,.55);}
html.light{--bg:#e8edf1;--text:#1a1a1a;--card:#fff;--accent:#2256c6;--shadow:rgba(0,0,0,.15);}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
.main{max-width:520px;margin:64px auto;padding:24px;text-align:center;}
.card{background:var(--card);border-radius:18px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,.25);}
button{margin:16px 6px 0;padding:14px 16px;border:none;border-radius:12px;background:var(--accent);color:#fff;cursor:pointer;}
</style>
</head>
<body>
<div class="main">
  <div class="card">
    <h1>Angler App</h1>
    <p>Du kannst die App als Gast nutzen oder dich registrieren, um mehr Funktionen freizuschalten.</p>
    <button onclick="window.location.href='login.html'">Login</button>
    <button onclick="window.location.href='register.html'">Registrieren</button>
  </div>
</div>
</body>
</html>
