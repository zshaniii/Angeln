<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Registrieren | Angler App</title>
<style>
:root{--bg:#262626;--text:#fff;--card:#333;--accent:#4c8bf5;--shadow:rgba(0,0,0,.55);}
html.light{--bg:#e8edf1;--text:#1a1a1a;--card:#fff;--accent:#2256c6;--shadow:rgba(0,0,0,.15);}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;transition:.2s;}
.main{max-width:480px;margin:64px auto;padding:24px;}
.card{background:var(--card);border-radius:18px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,.25);}
h1{margin-top:0;font-size:28px;}
label{display:block;margin:16px 0 8px;}
input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:transparent;color:var(--text);}
button{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;cursor:pointer;margin-top:18px;}
.footer{margin-top:16px;text-align:center;color:var(--muted);}
.footer a{color:var(--accent);text-decoration:none;}
.message{margin:12px 0;padding:12px;border-radius:12px;background:rgba(255,255,255,.08);}
</style>
</head>
<body>
<div class="main">
  <div class="card">
    <h1>Registrieren</h1>
    <div id="message" class="message" style="display:none"></div>
    <label for="username">Benutzername</label>
    <input id="username" autocomplete="username" />
    <label for="password">Passwort</label>
    <input id="password" type="password" autocomplete="new-password" />
    <button id="registerBtn">Konto erstellen</button>
    <div class="footer">Bereits registriert? <a href="login.html">Login</a></div>
  </div>
</div>
<script src="auth.js"></script>
<script>
  if(isLoggedIn()){
    window.location.href='account.html';
  }
  const message = document.getElementById('message');
  document.getElementById('registerBtn').onclick = ()=>{
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if(!username || !password){ message.style.display='block'; message.textContent='Bitte alle Felder ausfüllen.'; return; }
    if(registerUser(username,password)){
      window.location.href='account.html';
    } else {
      message.style.display='block'; message.textContent='Dieser Benutzername ist bereits vergeben.';
    }
  };
</script>
</body>
</html>
