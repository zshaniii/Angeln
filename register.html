<!DOCTYPE html>
<html lang="de">
<body>
<h2>Registrieren</h2>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Passwort">
<button id="regBtn">Registrieren</button>
<p id="msg"></p>

<script src="auth.js"></script>
<script>
regBtn.onclick = async () => {
  const r = await registerUser(u.value, p.value);
  msg.textContent = r.success ? "Erfolgreich!" : r.message;
  if (r.success) setTimeout(()=>location.href="login.html",1000);
};
</script>
</body>
</html>
