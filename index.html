<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Angler App – Start</title>

  <style>
    :root{
      --bg:#262626; --text:#fff; --card:#333; --muted:#d9d9d9;
      --accent:#4c8bf5; --shadow:rgba(0,0,0,.55); --icon:#fff;
    }
    html.light{
      --bg:#e8edf1; --text:#1a1a1a; --card:#fff; --muted:#555;
      --accent:#2256c6; --shadow:rgba(0,0,0,.15); --icon:#000;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    header{
      position:sticky;
      top:0;
      z-index:10;
      padding:14px 16px;
      background:linear-gradient(180deg,rgba(0,0,0,.35),transparent);
    }

    .bar{
      max-width:980px;
      margin:0 auto;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .header-action{
      position:absolute;
      left:0;
      padding:8px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.2);
      background:transparent;
      color:var(--text);
      cursor:pointer;
      font-weight:600;
    }

    .logo img{ height:58px; }

    .toggle{
      position:absolute;
      right:0;
      background:none;
      border:none;
      cursor:pointer;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:24px;
      text-align:center;
    }

    .menu-buttons{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:20px;
      margin-top:30px;
    }

    .btn-card{
      width:80%;
      max-width:420px;
      background:var(--card);
      padding:18px;
      border-radius:16px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:14px;
      cursor:pointer;
      box-shadow:0 10px 30px var(--shadow);
      transition:transform .2s;
    }
    .btn-card:hover{ transform:translateY(-3px); }

    .btn-title{
      font-size:20px;
      font-weight:700;
      text-align:center;
    }
    .icon{ width:28px;height:28px; }
    .spacer{ width:28px; }
  </style>
</head>

<body>

<header>
  <div class="bar">
    <button class="header-action" id="authHeaderBtn">Anmelden</button>

    <div class="logo">
      <img src="img/LOGO.png" alt="Logo">
    </div>

    <button class="toggle" id="themeBtn">
      <span id="themeIcon"></span>
    </button>
  </div>
</header>

<main class="wrap">
  <div class="menu-buttons">

    <div class="btn-card" onclick="go('lernen.html')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12c3-4 7-6 11-6 4 0 6 2 8 4-2 2-4 4-8 4-4 0-8-2-11-6z"/>
      </svg>
      <div class="btn-title">Lernen</div>
      <span class="spacer"></span>
    </div>

    <div class="btn-card" onclick="go('schonzeiten.html')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <div class="btn-title">Schonzeiten</div>
      <span class="spacer"></span>
    </div>

    <div class="btn-card" onclick="go('account.html')">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="3"/>
        <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
      </svg>
      <div class="btn-title">Mein Konto</div>
      <span class="spacer"></span>
    </div>

  </div>
</main>

<script src="auth.js"></script>
<script>
  function go(url){ window.location.href = url; }

  // Header Button Verhalten
  document.getElementById("authHeaderBtn").onclick = () => {
    if (isLoggedIn()) {
      go("account.html");
    } else {
      go("login.html");
    }
  };

  // Text im Header
  document.getElementById("authHeaderBtn").textContent =
    isLoggedIn() ? "Mein Konto" : "Anmelden";

  // Theme
  (function(){
    const saved = localStorage.getItem("theme") || "dark";
    document.documentElement.classList.add(saved);
    setIcon(saved);

    document.getElementById("themeBtn").onclick = () => {
      const now = document.documentElement.classList.contains("dark") ? "light" : "dark";
      document.documentElement.classList.remove("dark","light");
      document.documentElement.classList.add(now);
      localStorage.setItem("theme", now);
      setIcon(now);
    };

    function setIcon(mode){
      document.getElementById("themeIcon").innerHTML =
        mode === "dark"
        ? "☀️"
        : "🌙";
    }
  })();
</script>

</body>
</html>
