  <!DOCTYPE html>
  <html lang="de">
  <head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Prüfungsfragen – Angler App</title>

  <style>
  /* ======= THEME ======= */
  :root{
    --bg:#262626; 
    --text:#fff; 
    --card:#333;
    --muted:#d9d9d9;
    --icon:#fff;
  }
  html.light{
    --bg:#e8edf1; 
    --text:#1a111a; 
    --muted:#555; 
    --card:#fff;
    --icon:#000;
  }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  /* ======= HEADER ======= */
  header{
    position:sticky;
    top:0;
    z-index:200;
    background:var(--bg);
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 16px;
    box-shadow:0 2px 12px rgba(0,0,0,.45);
  }
  .bar{
    width:min(980px,100% - 24px);
    height:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
  }
  .title{
    font-weight:700;
    font-size:20px;
    letter-spacing:.2px;
    position:absolute;
    left:50%;
    transform:translateX(-50%);
  }

  /* ======= ICONS ======= */
  .menu-btn{
    background:transparent;
    border:none;
    padding:4px;
    cursor:pointer;
  }
  .menu-btn img{ height:34px; }
  .toggle{
    background:transparent;
    border:none;
    padding:6px;
    color:var(--icon);
    cursor:pointer;
  }
  .toggle:hover{ background:#ffffff25; }
  .toggle svg{ width:32px; height:32px; }

  /* ====== MENU (Sidebar) ====== */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    opacity:0;
    pointer-events:none;
    transition:.25s;
    z-index:900;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .side-menu{
    position:fixed;
    top:0; left:0; height:100vh;
    width:50vw; max-width:520px; min-width:280px;
    background:#333; color:#fff; border-right:1px solid #3f3f3f;
    transform:translateX(-100%); transition:.28s ease; z-index:1000;
    display:flex; flex-direction:column;
  }
  .side-menu.open{ transform:translateX(0); }

  .menu-header{
    padding:14px 16px; display:flex; justify-content:space-between;
    align-items:center; border-bottom:1px solid #444;
  }
  .menu-close{
    background:transparent; border:1px solid #555;
    border-radius:10px; padding:6px 10px; color:#fff; cursor:pointer;
  }

  .menu-list{ list-style:none; margin:0; padding:0; }
  .menu-item{
    padding:14px 16px; border-bottom:1px solid #3f3f3f; cursor:pointer;
  }
  .menu-item:hover{ background:#3a3a3a; }

  .menu-group{
    padding:14px 16px; border-bottom:1px solid #3f3f3f; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
  }
  .menu-group:hover{ background:#3a3a3a; }
  .caret{ transition:.25s; }
  .submenu{
    max-height:0; overflow:hidden; background:#2c2c2c; transition:max-height .28s ease;
  }
  .submenu.open{ max-height:300px; }
  .submenu-item{
    padding:12px 32px; border-bottom:1px solid #3f3f3f; cursor:pointer;
  }
  .submenu-item:hover{ background:#353535; }

  /* ======= CONTENT ======= */
  .wrap{
    width:min(980px,100% - 24px);
    margin:20px auto;
    padding-top:20px;
  }

  #quiz{
    max-width:740px;
    margin:28px auto;
    text-align:center;
  }

  #frageText{
    font-size:20px;
    font-weight:700;
    margin-bottom:14px;
  }

  #answers{
    display:grid;
    gap:10px;
    margin-top:10px;
  }

  #answers .choice{
    background:#4c8bf5;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px 16px;
    cursor:pointer;
    font-size:17px;
    transition:.15s;
    width:80%;
    max-width:360px;
    margin:0 auto;
  }
  #answers .choice:hover{ background:#6ea3ff; transform:translateY(-2px); }
  #answers .choice.selected{ outline:3px solid #ffd166; }
  #answers .choice.correct{ background:#22c55e !important; }
  #answers .choice.wrong{ background:#c62828 !important; }

  #controls{
    margin-top:16px;
  }
  #btnPruefen, #btnWeiter{
    background:#333;
    color:#fff;
    border:1px solid #555;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    margin:6px;
  }
  #btnPruefen:hover, #btnWeiter:hover{ background:#3a3a3a; }
  #btnWeiter:disabled{ opacity:.6; cursor:not-allowed; }

  #result{
    min-height:26px;
    font-size:18px;
    margin-top:8px;
  }
  </style>
  </head>

  <body>

  <!-- ===== OVERLAY ===== -->
  <div id="overlay" class="overlay"></div>

  <!-- ===== SIDEBAR ===== -->
  <nav id="sideMenu" class="side-menu" aria-label="Hauptmenü">
    <div class="menu-header">
      <strong>Menü</strong>
      <button id="menuClose" class="menu-close">✕</button>
    </div>

    <ul class="menu-list">
      <li class="menu-item" onclick="go('index.html')">🏠 Start</li>

      <li class="menu-group" id="lernenToggle">
        <span>📘 Lernen</span>
        <span class="caret">▶</span>
      </li>
      <div class="submenu" id="lernenMenu">
        <div class="submenu-item" onclick="go('fischkunde.html')">Fischkunde</div>
        <div class="submenu-item" onclick="go('pruefungsfragen.html')">Prüfungsfragen</div>
        <div class="submenu-item" onclick="go('rutenbau.html')">Rutenbau</div>
      </div>

      <li class="menu-item" onclick="go('schonzeiten.html')">🗓️ Schonzeiten</li>
    </ul>
  </nav>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="bar">
      <button class="menu-btn" id="menuButton" aria-label="Menü öffnen">
        <img src="img/Menü.png" alt="Menü">
      </button>

      <div class="title">Prüfungsfragen</div>

      <button id="themeBtn" class="toggle" aria-label="Theme umschalten">
        <span id="themeIcon"></span>
      </button>
    </div>
  </header>

  <!-- ===== QUIZ ===== -->
  <main class="wrap">
    <section id="quiz" aria-label="Prüfungsfragen Quiz">
      <div id="frageText">Frage wird geladen…</div>

      <div id="answers">
        <button class="choice"></button>
        <button class="choice"></button>
        <button class="choice"></button>
      </div>

      <div id="controls">
        <button id="btnPruefen">Prüfen</button>
        <button id="btnWeiter" disabled>Weiter</button>
      </div>

      <p id="result"></p>
    </section>
  </main>

  <script>
  function go(u){ window.location.href = u; }

  /* ===== Menü ===== */
  const menuBtn  = document.getElementById("menuButton");
  const sideMenu = document.getElementById("sideMenu");
  const overlay  = document.getElementById("overlay");
  const menuClose= document.getElementById("menuClose");

  menuBtn.onclick   = () => { sideMenu.classList.add("open"); overlay.classList.add("open"); };
  menuClose.onclick = () => { sideMenu.classList.remove("open"); overlay.classList.remove("open"); };
  overlay.onclick   = () => { sideMenu.classList.remove("open"); overlay.classList.remove("open"); };

  /* ===== Dropdown ===== */
  const lernenToggle = document.getElementById("lernenToggle");
  const lernenMenu   = document.getElementById("lernenMenu");
  const caret        = lernenToggle.querySelector(".caret");

  lernenToggle.onclick = () => {
    lernenMenu.classList.toggle("open");
    caret.style.transform = lernenMenu.classList.contains("open") ? "rotate(90deg)" : "rotate(0deg)";
  };

  /* ===== Theme ===== */
  (function(){
    const saved = localStorage.getItem("theme") || "dark";
    document.documentElement.classList.add(saved);
    setIcon(saved);

    document.getElementById("themeBtn").onclick = () => {
      const now = document.documentElement.classList.contains("dark") ? "light" : "dark";
      document.documentElement.classList.remove("dark","light");
      document.documentElement.classList.add(now);
      localStorage.setItem("theme", now);
      setIcon(now);
    };

    function setIcon(mode){
      document.getElementById("themeIcon").innerHTML =
        mode === "dark"
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="var(--icon)"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    }
  })();

  /* Helpers */
  function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

  /* State */
  let deck = [];
  let aktuelle = null;
  let gewaehlt = -1;

  /* Neues Frage-Deck */
  function neuesDeck(){ deck = shuffle([...Array(fragen.length).keys()]); }

  /* ===== Neue Frage (mit zufälligen Antworten!) ===== */
  function neueFrage(){
    if(deck.length === 0) neuesDeck();
    const idx = deck.pop();
    const f = fragen[idx];

    // Antworten + Korrekt-Info bündeln
    let antwortObjekte = f.antworten.map((text, i)=>({
      text,
      istKorrekt: i === f.korrekt
    }));

    // Antworten mischen
    antwortObjekte = shuffle(antwortObjekte);

    // gemischte Antworten + neuen korrekten Index übernehmen
    aktuelle = {
      frage: f.frage,
      antworten: antwortObjekte.map(a => a.text),
      korrekt: antwortObjekte.findIndex(a => a.istKorrekt)
    };

    gewaehlt = -1;
    renderFrage();
  }

  /* Render Frage */
  function renderFrage(){
    const frageEl = document.getElementById("frageText");
    const btns = [...document.querySelectorAll("#answers .choice")];
    const result = document.getElementById("result");

    frageEl.textContent = aktuelle.frage;
    result.textContent = "";

    aktuelle.antworten.forEach((txt,i)=>{
      const b = btns[i];
      b.textContent = txt;
      b.className = "choice";
      b.disabled = false;

      b.onclick = ()=>{
        gewaehlt = i;
        btns.forEach(x=>x.classList.remove("selected"));
        b.classList.add("selected");
      };
    });

    document.getElementById("btnPruefen").disabled = false;
    document.getElementById("btnWeiter").disabled = true;
  }

  /* Prüfen */
  function pruefen(){
    if(gewaehlt === -1){
      const r = document.getElementById("result");
      r.textContent = "Bitte erst eine Antwort auswählen.";
      r.style.color = "gold";
      return;
    }

    const btns = [...document.querySelectorAll("#answers .choice")];
    const r = document.getElementById("result");

    btns.forEach(b=>b.disabled = true);

    btns[aktuelle.korrekt].classList.add("correct");

    if(gewaehlt !== aktuelle.korrekt){
      btns[gewaehlt].classList.add("wrong");
      r.textContent = "Falsch! Richtig ist: " + aktuelle.antworten[aktuelle.korrekt];
      r.style.color = "salmon";
    } else {
      r.textContent = "Richtig!";
      r.style.color = "lightgreen";
    }

    document.getElementById("btnPruefen").disabled = true;
    document.getElementById("btnWeiter").disabled = false;
  }

  document.getElementById("btnPruefen").onclick = pruefen;
  document.getElementById("btnWeiter").onclick  = neueFrage;

  neuesDeck();
  neueFrage();
  </script>
